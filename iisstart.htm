    <!-- Add service modal -->

          &times;
        </button>

          <h2 class="service-form__title" id="service-form-title">Add new service</h2>

            <span class="service-form__label">Name</span>
            <input class="service-form__input" type="text" name="title" required />
          </label>
          <label class="service-form__field">

          </label>
          <div class="service-form__field">

              <span class="upload-dropzone__hint">or click to select</span>

    <script>
      // Uptime Kuma modal
      const kumaModal = document.getElementById('kuma-modal');
      const openKumaModal = document.getElementById('open-kuma-modal');
      const closeKumaModal = document.getElementById('close-kuma-modal');

      const openKumaStatus = () => {
        kumaModal.classList.add('is-active');
        kumaModal.setAttribute('aria-hidden', 'false');
      };

      const closeKumaStatus = () => {
        kumaModal.classList.remove('is-active');
        kumaModal.setAttribute('aria-hidden', 'true');
      };

      closeKumaModal.addEventListener('click', closeKumaStatus);

      kumaModal.addEventListener('click', event => {
        if (event.target === kumaModal) {
          closeKumaStatus();
        }
      });

      // Easter egg: light theme
      const lightThemeButton = document.getElementById('light-theme-btn');
      const lightOverlay = document.getElementById('light-overlay');
      const lightOverlayText = document.getElementById('light-overlay-text');

      lightThemeButton.addEventListener('click', () => {
        lightThemeButton.style.display = 'none';
        lightOverlay.classList.add('is-active');
        lightOverlay.setAttribute('aria-hidden', 'false');
        setTimeout(() => lightOverlayText.classList.add('is-visible'), 3500);
      });

      // Add/edit/remove services
      const addServiceButton = document.getElementById('open-add-service');
      const editModeButton = document.getElementById('toggle-edit-mode-v2');
      const addServiceModal = document.getElementById('add-service-modal');
      const closeAddService = document.getElementById('close-add-service');
      const backgroundButton = document.getElementById('open-background-picker');
      const backgroundModal = document.getElementById('background-modal');
      const closeBackgroundModal = document.getElementById('close-background-modal');
      const serviceForm = document.getElementById('service-form');
      const serviceFormTitle = document.getElementById('service-form-title');
      const serviceFormSubmit = document.getElementById('service-form-submit');
      const serviceIdInput = document.getElementById('service-id');
      const titleInput = serviceForm.querySelector('input[name="title"]');
      const urlInput = serviceForm.querySelector('input[name="url"]');
      const backgroundForm = document.getElementById('background-form');
      const backgroundDropzone = document.getElementById('background-dropzone');
      const backgroundFileInput = document.getElementById('background-file');
      const backgroundPreview = document.getElementById('background-preview');
      const backgroundUrlInput = document.getElementById('background-url');
      const servicesGrid = document.getElementById('services-grid');
      const removeModeButton = document.getElementById('toggle-remove-mode-v2');
      const dropzone = document.getElementById('upload-dropzone');
      const iconFileInput = document.getElementById('icon-file');
      const iconUrlInput = document.getElementById('icon-url');
      const uploadPreview = document.getElementById('upload-preview');
      const settingsApiUrl = '/api/settings';
      const servicesApiUrl = '/api/services';
      const uploadApiUrl = '/api/upload';
      let services = [];
      const generateId = () => {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
          return window.crypto.randomUUID();
        }
        return `id-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
      };

      const initialServices = Array.from(servicesGrid.querySelectorAll('.service-card')).map(card => {
        const label = card.querySelector('.service-card__label');
        const image = card.querySelector('.service-card__image');
        return {
          id: card.id || generateId(),
          title: label ? (label.textContent || '').trim() : 'Untitled',
          url: card.dataset.url || '',
          icon: image ? image.getAttribute('src') || '' : '',
          isModal: card.id === 'open-kuma-modal'
        };
      });
      servicesGrid.innerHTML = '';
      let isRemovalMode = false;
      let isEditMode = false;
      let editingServiceId = '';
      let editingServiceIcon = '';

      const syncModeButtons = () => {
        if (isEditMode) {
          servicesGrid.classList.add('is-edit-mode');
          editModeButton.classList.add('is-active', 'is-edit-active');
          
          isRemovalMode = false;
          servicesGrid.classList.remove('is-removal-mode');
          removeModeButton.classList.remove('is-active', 'is-remove-active');
        } else {
          servicesGrid.classList.remove('is-edit-mode');
          editModeButton.classList.remove('is-active', 'is-edit-active');
        }
        
        if (isRemovalMode) {
          servicesGrid.classList.add('is-removal-mode');
          removeModeButton.classList.add('is-active', 'is-remove-active');
          
          isEditMode = false;
          servicesGrid.classList.remove('is-edit-mode');
          editModeButton.classList.remove('is-active', 'is-edit-active');
        } else {
          servicesGrid.classList.remove('is-removal-mode');
          removeModeButton.classList.remove('is-active', 'is-remove-active');
        }
      };

      const forceClearRemovalButton = () => {
        isRemovalMode = false;
        servicesGrid.classList.remove('is-removal-mode');
        removeModeButton.classList.remove('is-active', 'is-remove-active');
      };

      const openModal = modal => {
        modal.classList.add('is-active');
        modal.setAttribute('aria-hidden', 'false');
      };

      const closeModal = modal => {
        modal.classList.remove('is-active');
        modal.setAttribute('aria-hidden', 'true');
      };

      const resetServiceForm = () => {
        serviceForm.reset();
        iconUrlInput.value = '';
        serviceIdInput.value = '';
        editingServiceId = '';
        editingServiceIcon = '';
        setPreview('', '');
        serviceFormTitle.textContent = 'Add new service';
        serviceFormSubmit.textContent = 'Add';
      };

      const openAddServiceForm = () => {
        forceClearRemovalButton();
        isEditMode = false;
        syncModeButtons();
        resetServiceForm();
        openModal(addServiceModal);
      };

      const openEditServiceForm = service => {
        forceClearRemovalButton();
        isEditMode = false;
        syncModeButtons();
        resetServiceForm();
        editingServiceId = service.id;
        editingServiceIcon = service.icon || '';
        serviceIdInput.value = service.id;
        titleInput.value = service.title;
        urlInput.value = service.url;
        if (service.icon) {
          iconUrlInput.value = service.icon;
          setPreview(resolveIconUrl(service.icon), service.title);
        }
        serviceFormTitle.textContent = 'Edit service';
        serviceFormSubmit.textContent = 'Save';
        openModal(addServiceModal);
      };

      addServiceButton.addEventListener('click', openAddServiceForm);
      closeAddService.addEventListener('click', () => {
        closeModal(addServiceModal);
        resetServiceForm();
      });

      backgroundButton.addEventListener('click', () => {
        forceClearRemovalButton();
        isEditMode = false;
        syncModeButtons();
        openModal(backgroundModal);
      });
      closeBackgroundModal.addEventListener('click', () => closeModal(backgroundModal));

      addServiceModal.addEventListener('click', event => {
        if (event.target === addServiceModal) {
          closeModal(addServiceModal);
          resetServiceForm();
        }
      });

      backgroundModal.addEventListener('click', event => {
        if (event.target === backgroundModal) {
          closeModal(backgroundModal);
        }
      });

      editModeButton.addEventListener('click', () => {
        if (isRemovalMode) {
          forceClearRemovalButton();
        }
        isEditMode = !isEditMode;
        syncModeButtons();
        editModeButton.blur();
      });

      removeModeButton.addEventListener('click', () => {
        isRemovalMode = !isRemovalMode;
        syncModeButtons();
        removeModeButton.blur();
      });

      const normalizeService = service => ({
        id: service.id || generateId(),
        title: service.title || 'Untitled',
        url: service.url || '',
        icon: service.icon || '',
        isModal: service.isModal ?? false
      });

      const resolveIconUrl = icon => {
        if (!icon) {
          return 'assets/images/tool.png';
        }
        if (icon.startsWith('/') || icon.startsWith('http://') || icon.startsWith('https://')) {
          return icon;
        }
        if (icon.startsWith('uploads/')) {
          return `/${icon}`;
        }
        return `assets/images/${icon}`;
      };

      const renderServices = () => {
        servicesGrid.innerHTML = '';
        services.forEach(service => {
          const card = createServiceCard(service);
          servicesGrid.appendChild(card);
        });
      };

      const createServiceCard = service => {
        const card = document.createElement('button');
        card.className = 'service-card';
        card.type = 'button';
        card.dataset.url = service.url;
        if (service.id) {
          card.id = service.id;
        }
        if (service.isModal) {
          card.dataset.modal = 'true';
        }

        const iconWrapper = document.createElement('span');
        iconWrapper.className = 'service-card__icon';

        const image = document.createElement('img');
        image.className = 'service-card__image';
        image.alt = service.title;
        image.src = resolveIconUrl(service.icon);
        iconWrapper.appendChild(image);

        const label = document.createElement('span');
        label.className = 'service-card__label';
        label.textContent = service.title;

        const editBadge = document.createElement('span');
        editBadge.className = 'service-card__edit';
        editBadge.setAttribute('aria-label', 'Edit');
        editBadge.setAttribute('role', 'button');
        editBadge.setAttribute('tabindex', '0');
        editBadge.textContent = '✏️';

        const remove = document.createElement('span');
        remove.className = 'service-card__remove';
        remove.setAttribute('aria-hidden', 'true');
        remove.textContent = '✕';

        card.appendChild(iconWrapper);
        card.appendChild(label);
        card.appendChild(editBadge);
        card.appendChild(remove);

        return card;
      };

      const applyBackground = url => {
        if (!url) {
          document.body.style.backgroundImage = '';
          return;
        }
        document.body.style.backgroundImage = `url("${url}")`;
      };

      const fetchSettings = async () => {
        try {
          const response = await fetch(settingsApiUrl, { cache: 'no-store' });
          if (!response.ok) {
            return;
          }
          const data = await response.json();
          applyBackground(data.backgroundUrl || '');
        } catch (error) {
          console.error(error);
        }
      };

      const saveSettings = async payload => {
        const response = await fetch(settingsApiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
      };

      const fetchServices = async () => {
        try {
          const response = await fetch(servicesApiUrl, { cache: 'no-store' });
          if (!response.ok) {
            throw new Error('Failed to load services');
          }
          const data = await response.json();
          if (!data || typeof data !== 'object') {
            services = [];
          } else if (data.initialized) {
            services = Array.isArray(data.items) ? data.items.map(normalizeService) : [];
          } else if (initialServices.length > 0) {
            services = initialServices.map(normalizeService);
            await saveServices();
          } else {
            services = [];
          }

          services = services.map(service => ({
            ...service,
            icon: service.icon ? service.icon.replace(/^\/?assets\/images\//, '') : ''
          }));

          renderServices();
        } catch (error) {
          console.error(error);
        }
      };

      const saveServices = async () => {
        const response = await fetch(servicesApiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(services)
        });
      };

      const uploadFile = async file => {
        const formData = new FormData();
        formData.append('file', file);

        const response = await fetch(uploadApiUrl, {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          throw new Error('Failed to upload file');
        }

        const data = await response.json();
        if (!data.success) {
          throw new Error(data.message || 'Failed to upload file');
        }

        return data.url;
      };

      const setPreview = (url, name) => {
        if (!url) {
          uploadPreview.textContent = '';
          return;
        }

        uploadPreview.innerHTML = `
          <div class="upload-preview__item">
            <img src="${resolveIconUrl(url)}" alt="${name}" class="upload-preview__image" />
            <span class="upload-preview__name">${name}</span>
          </div>
        `;
      };

      const handleFileSelect = async file => {
        if (!file) {
          return;
        }
        try {
          dropzone.classList.add('is-loading');
          const url = await uploadFile(file);
          iconUrlInput.value = url;
          setPreview(url, file.name);
        } catch (error) {
          alert(error.message);
        } finally {
          dropzone.classList.remove('is-loading');
        }
      };

      const handleBackgroundSelect = async file => {
        if (!file) {
          return;
        }
        try {
          backgroundDropzone.classList.add('is-loading');
          const url = await uploadFile(file);
          backgroundUrlInput.value = url;
          backgroundPreview.innerHTML = `
            <div class="upload-preview__item">
              <img src="${url}" alt="${file.name}" class="upload-preview__image" />
              <span class="upload-preview__name">${file.name}</span>
            </div>
          `;
        } catch (error) {
          alert(error.message);
        } finally {
          backgroundDropzone.classList.remove('is-loading');
        }
      };

      iconFileInput.addEventListener('change', event => handleFileSelect(event.target.files[0]));

      dropzone.addEventListener('dragover', event => {
        event.preventDefault();
        dropzone.classList.add('is-dragover');
      });

      dropzone.addEventListener('dragleave', () => dropzone.classList.remove('is-dragover'));

      dropzone.addEventListener('drop', event => {
        event.preventDefault();
        dropzone.classList.remove('is-dragover');
        handleFileSelect(event.dataTransfer.files[0]);
      });

      backgroundFileInput.addEventListener('change', event => handleBackgroundSelect(event.target.files[0]));

      backgroundDropzone.addEventListener('dragover', event => {
        event.preventDefault();
        backgroundDropzone.classList.add('is-dragover');
      });

      backgroundDropzone.addEventListener('dragleave', () => backgroundDropzone.classList.remove('is-dragover'));

      backgroundDropzone.addEventListener('drop', event => {
        event.preventDefault();
        backgroundDropzone.classList.remove('is-dragover');
        handleBackgroundSelect(event.dataTransfer.files[0]);
      });

      backgroundForm.addEventListener('submit', async event => {
        event.preventDefault();
        const url = backgroundUrlInput.value.trim();
        applyBackground(url);
        await saveSettings({ backgroundUrl: url });
        closeModal(backgroundModal);
      });

      serviceForm.addEventListener('submit', async event => {
        event.preventDefault();
        const formData = new FormData(serviceForm);
        const titleRaw = formData.get('title');
        const urlRaw = formData.get('url');
        const iconRaw = formData.get('icon');
        const title = titleRaw ? titleRaw.toString().trim() : '';
        const url = urlRaw ? urlRaw.toString().trim() : '';
        const icon = iconRaw ? iconRaw.toString().trim() : '';
        const resolvedIcon = icon || editingServiceIcon;

        if (!title || !url) {
          return;
        }

        if (editingServiceId) {
          const index = services.findIndex(service => service.id === editingServiceId);
          if (index !== -1) {
            services[index] = {
              ...services[index],
              title,
              url,
              icon: resolvedIcon
            };
          }
        } else {
          services.push({
            id: generateId(),
            title,
            url,
            icon,
            isModal: false
          });
        }

        await saveServices();
        renderServices();
        closeModal(addServiceModal);
        resetServiceForm();
      });

      servicesGrid.addEventListener('click', async event => {
        const card = event.target.closest('.service-card');
        if (!card) {
          return;
        }

        if (isRemovalMode && event.target.closest('.service-card__remove')) {
          event.stopPropagation();
          const id = card.id;
          services = services.filter(service => service.id !== id);
          await saveServices();
          renderServices();
          return;
        }

        if (isRemovalMode) {
          forceClearRemovalButton();
          syncModeButtons();
        }

        if (isEditMode || event.target.closest('.service-card__edit')) {
          const id = card.id;
          const service = services.find(item => item.id === id);
          if (service && !service.isModal) {
            openEditServiceForm(service);
          }
          return;
        }

        if (card.dataset.modal === 'true') {
          openKumaStatus();
          return;
        }

        const url = card.dataset.url;
        if (url) {
          window.open(url);
        }
      });

      fetchServices();
      fetchSettings();
    </script>
  </body>
</html>
