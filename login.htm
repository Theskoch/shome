<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Вход в панель</title>
    <link rel="stylesheet" href="css.css" />
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon" />
  </head>
  <body class="login-page">
    <div class="auth-backdrop is-active" aria-hidden="false">
      <div class="auth-card" role="dialog" aria-modal="true" aria-label="Авторизация">
        <h2 class="auth-card__title">Вход</h2>
        <form class="auth-form" id="auth-form">
          <label class="auth-form__field">
            <span class="auth-form__label">Логин</span>
            <input class="auth-form__input" type="text" name="username" autocomplete="username" required />
          </label>
          <label class="auth-form__field">
            <span class="auth-form__label">Пароль</span>
            <input class="auth-form__input" type="password" name="password" autocomplete="current-password" required />
          </label>
          <div class="auth-form__error" id="auth-error" aria-live="polite"></div>
          <button class="auth-form__submit" type="submit">Войти</button>
        </form>
      </div>
    </div>

    <script>
      const authForm = document.getElementById('auth-form');
      const authError = document.getElementById('auth-error');
      const authLoginUrl = '/api/auth/login';

      authForm.addEventListener('submit', async event => {
        event.preventDefault();
        authError.textContent = '';
        const formData = new FormData(authForm);
        const username = (formData.get('username') || '').toString().trim();
        const password = (formData.get('password') || '').toString();
        if (!username || !password) {
          authError.textContent = 'Введите логин и пароль';
          return;
        }
        try {
          const response = await fetch(authLoginUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
          });
          const data = await response.json();
          if (!response.ok || !data.success) {
            authError.textContent = data.message || 'Ошибка авторизации';
            return;
          }
          window.location.href = '/app';
        } catch (error) {
          authError.textContent = 'Ошибка соединения';
        }
      });
    </script>
  </body>
</html>
